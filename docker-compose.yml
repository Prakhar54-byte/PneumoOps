version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONPATH=/app
      - PNEUMOOPS_PROFILE=chestmnist
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7860/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7861:7861"
    environment:
      - PYTHONPATH=/app
      - BACKEND_PREDICT_URL=http://backend:7860/predict
      - GRADIO_PORT=7861
    command: ["python", "frontend/app_simple.py"]
    depends_on:
      backend:
        condition: service_healthy
